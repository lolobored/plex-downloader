spring:
  datasource:
    url: jdbc:postgresql://db:5432/plexdownloader
    username: plexdl
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-minimum-32-chars-long-change-in-prod}
    expiration-ms: 86400000
