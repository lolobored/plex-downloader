databaseChangeLog:
  - changeSet:
      id: 006-playlists
      author: plexdownloader
      changes:
        - sql:
            sql: |
              CREATE TABLE playlists (
                id            BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                plex_id       VARCHAR(255) NOT NULL UNIQUE,
                title         TEXT NOT NULL,
                playlist_type VARCHAR(20),
                leaf_count    INT NOT NULL DEFAULT 0,
                synced_at     TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE playlist_items (
                id         BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                playlist_id BIGINT NOT NULL REFERENCES playlists(id) ON DELETE CASCADE,
                plex_id    VARCHAR(255) NOT NULL,
                media_type VARCHAR(20) NOT NULL,
                ordinal    INT,
                CONSTRAINT uq_playlist_item UNIQUE (playlist_id, plex_id)
              );

              CREATE TABLE playlist_subscriptions (
                id          BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                user_id     BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
                playlist_id BIGINT NOT NULL REFERENCES playlists(id) ON DELETE CASCADE,
                created_at  TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT now(),
                CONSTRAINT uq_playlist_sub UNIQUE (user_id, playlist_id)
              );
