services:

  plex-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    image: lolobored/plex-downloader:latest
    ports:
      - "3615:8080"
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "render"
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ${MOVIES_PATH:-/volume1/video/Movies}:/movies:ro
      - ${TV_PATH:-/volume1/video/TV}:/tv:ro
      - ${PLEX_CONVERSION_PATH:-/volume1/downloads/plex-download}:/plex-conversion:rw
      - ./volumes/posters:/posters:rw
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
